site_name: groundfield
site_description: Numerische Feldberechnung von Erdungsanlagen.
site_url: https://ce1ectric.github.io/groundfield/
repo_url: https://github.com/Ce1ectric/groundfield
repo_name: Ce1ectric/groundfield
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Christian Ehlert

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Zu dunklem Modus wechseln
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Zu hellem Modus wechseln
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
  - mkdocs-jupyter:
      execute: false
      include_source: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ce1ectric/groundfield

nav:
  - Start: index.md
  - Installation: installation.md
  - Schnelleinstieg: quickstart.md
  - Konzepte: concepts.md
  - Beispiele:
      - Überblick: examples/index.md
  - API-Referenz:
      - Überblick: api/index.md
      - Soil: api/soil.md
      - Geometry: api/geometry.md
      - Conductors: api/conductors.md
      - Solver: api/solver.md
      - Coupling: api/coupling.md
      - Postprocess: api/postprocess.md
      - IO: api/io.md
