site_name: groundfield
site_description: Numerical field computation for grounding systems.
site_url: https://ce1ectric.github.io/groundfield/
repo_url: https://github.com/Ce1ectric/groundfield
repo_name: Ce1ectric/groundfield
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Christian Ehlert

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.highlight
    - search.share
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
  - mkdocs-jupyter:
      execute: false
      include_source: true

extra_javascript:
  - javascripts/mathjax.js
  # The previously-referenced ES6 polyfill CDN was removed
  # (fourth 2026-05-12 audit pass): the domain is no longer
  # trusted (CDN ownership change in early 2024 led to malicious
  # payloads). Modern MathJax 3 / tex-mml-chtml does not require
  # an ES6 polyfill for any browser the docs target.
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Ce1ectric/groundfield

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - Performance: performance.md
  - Examples:
